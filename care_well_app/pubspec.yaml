name: care_well_app
description: "CareWell — aplicación móvil para cuidadores y responsables de personas dependientes."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Internacionalización de widgets de Material (showDatePicker, showTimePicker, etc.)
  flutter_localizations:
    sdk: flutter

  # Estado e inyección de dependencias
  flutter_riverpod: ^2.6.1

  # Navegación
  go_router: ^14.6.2

  # Animaciones
  animate_do: ^3.3.4

  # Internacionalización y formato de fechas/números
  intl: ^0.20.2

  # Notificaciones locales (módulo Agenda)
  flutter_local_notifications: ^18.0.1

  # Soporte de zonas horarias para notificaciones
  timezone: ^0.9.4

  # Peticiones HTTP y HTTPS
  dio: ^5.7.0

  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  # Fuentes tipográficas
  # TODO: Descargar los archivos .ttf de Inter (https://fonts.google.com/specimen/Inter)
  #       y colocarlos en assets/fonts/ antes de descomentar esta sección.
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/carewell-icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#F0F4F4"
  adaptive_icon_foreground: "assets/images/carewell-icon.png"
